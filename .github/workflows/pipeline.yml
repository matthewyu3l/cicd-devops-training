name: Java Enterprise CI Pipeline

# Trigger this automated pipeline every time a push event happens on the main branch
on:
  push:
    branches: [ main ]

jobs:
  build-and-package:
    # Run these steps on a clean, temporary cloud server provided by GitHub
    runs-on: ubuntu-latest

    steps:
    # Step 1: Pull the latest source code from the GitHub repository onto the runner
    - name: Check out repository code
      uses: actions/checkout@v4

    # Step 2: Configure a secure, clean Java Runtime Environment on the runner
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven' # Automatically caches dependencies to speed up future builds

    # Step 3: Run the compilation, test verification, and package phases
    - name: Compile and Test with Maven
      run: mvn clean package

    # Step 4: Build the production container image locally on the runner
    - name: Build Docker Container Image
      run: docker build -t sre-app:${{ github.sha }} .

    # Step 5: Inform SRE teams that the build pass was successful
    - name: Pipeline Status Report
      run: echo "CI Pipeline complete! Image ready for artifact registry deployment."
